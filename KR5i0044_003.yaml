能殫如是功行果能具足乃證無上至於無為至無無為如是無為與天地俱不與同盡蓋此天地俱為有為有所為為則必有盡天有所為故天亦老地有所為故地亦荒至人無為既臻無為有何荒老未有天地此至人存既有天地此至人出天地荒老此至人安微乎微乎如是至人我亦難名然究其極人人如是何以如是以先天故如是先天人人所有乃人有此而多昧昧此又何故蓋有先天不無後天既有後天乃有六根既有六根遂生六識六根謂何其一目是乃此目根觀諸色相生種種心而昧先天其一耳根聽諸聲音生種種心而昧先天其一口根出諸是非生種種心而昧先天其一鼻根聞諸臭香生種種心而昧先天其一舌根䑛諸甘苦生種種心而昧先天其一身根厯諸境界生種種心而昧先天故此六根是名六賊欲聞大道先淸六根六根不淸生諸惡識此六根者於何得淸昔有達士知所由道一切聞見境界因緣都無所住觀不以目聽不以耳緘口吸舌終日如愚息氣以踵置身無用一切舉動皆以神運如是六根完全具足而如無有無有六根有何惡識乃無惡識安生惡趣以無識趣故無𦊱礙無𦊱礙故心君泰寧如是心君果無染著乃安爐竈投諸三寶能結大丹所結治故用坎中水噀巽地風運離宮火共撰三寶此三為一大丹乃成既成大丹龍虎伏降陰陽定位然必拜求高真指受祕訣精微以證其果維彼下士罔知其故妄意造作搬弄採鍊種種邪術背道愈甚如此背誤則有種種魔障相尋上千天怒下犯刑憲若彼隱淪耽心泉石知此門故煉氣寧神聚此三寶欲成大丹然或修持不得證果終罹三災可知大道亦甚難言如此等衆尚莫能遁况彼衆生不明大道罔惜三寶六根寖熾七情孔彰視此三寶若非已物夫人一身止精氣神不愛其精任意作喪如彼漏𠂋巳注一勺水無所增益漸次瀉泄不瞬息間遂無涓滴不愛其氣任意縱橫如彼瓣香置諸紅爐聽其焚灼更加炭火不瞬息間即為灰燼不愛其神任意耗斁如彼孤燈置諸風前聽其煽搖無所遮護不瞬息間即為撲滅危乎危乎失此三寶則失其生墮諸惡劫展轉循環靡所止住我悲衆生為說此道若有善士依吾所說或遁深山或居塵世或住道院或搆茆庵鍊此三寶如是不懈自有真人明示其要第此衆生以六根故生彼六識以六識故生彼七情豈知七情迷惑本真本真既失七情斯狂然此七情每種於愛此何以故蓋此愛者為情之根無所為愛乃無所欲既無所欲有何可喜無所可喜斯無所惡無喜無惡有何忿怒既無忿怒恐懼不作乃無恐怖哀兆悉捐故知愛者種諸情根不絶其根而故强制其所制者皆為末流如彼洚水洞洞蕩蕩勢稽於天不塞其原不淸其流任意隄防終遭墊溺如彼炎火熯熯赫赫氣冲九霄不抽其薪不截其道任意撲滅反助炎威即隨所觸旋為懾伏如彼海汛漭漭蒼蒼滉滉湯湯此息彼作彼斂此猖有何紀極感之召之俱隨此心因緣而長惟彼至人知此種故立宏誓願發勇猛心仗智慧劍斬其根苗剿其醜類無使七情依附而生蓋此七情為一大關而此愛欲為關之鍵斬鍵奪關跳離閾限撒手坦行無所阻滯克明至道爰躋高真我悲衆生為此一愛生種種魔起種種障迷惑顚倒自離母腹以迄死亡鮮所悔悟即有高人耳提面命如鼓聾夫如燭矇瞍終無所覺歎哉歎哉乃復狂誕妄希聞道以乞長生學仙學佛如彼盲史履嶨音學而投音頭如彼屠兒淬刀事神如盜胠篋禜禳祈福匪為弗得亦有其尤然則欲聞至道玄妙非割所愛以斷七情終屬妄想我為女說此種因緣女宜諦聽夫此七情於何能除其所除道當思無我曷名無我我本非我我非此我我有何愛惟其有我而執為我執我為我無乎非我無非是我無我弗愛此非我有而愛殉之彼非我有而愛殉之凡諸一切有聲有臭有形有色種種外物均非所有而我殉之如蠅逐臭如蟻附羶如蜂鑽窗見睍撲刮以至貪婪叨餮𨆪趨帆如轆嗜如喋音霎沓音塔爾攫我摶揋音畏如野鶩趨唼菰米罔所止足然試思我未有我時曾何如是應為爽然匪惟此說隙駒犳音勺影光陰朝露不瞬息間我為烏有我既無我我愛何為我自捫心啞然一笑以此參究愛何弗除既除其愛無所弗除欲也惡也喜也哀也懼也怒也私也情也俱隨此愛一時而盡第人於愛如膠如漆輒難解脫人溺於愛如墮廣奫音斌氽吞上聲泅求出茫無涯涘我深憫惻為施寶筏以度羣溺奈何衆生沉淪己久無梯無航嘆哉衆生豫為女計豫有一術其術為何必先能忍曷為能忍當自思維旋加猛省我聞昔人享極富貴子女盈室親友滿座凡諸玩好綺繡膏粱羅列四筵高堂廣厦畫梲雕楹娛心悅目一旦捐捨其所可愛心印斯道於是決時則有魔障嬌啼宛轉勸阻毁謗甚至涕淚相環抱引不得解脫而此高人忍心弗顧視如墮甑棄如敝屣厞音費跡穼音森谷窅窱之間罔所㕧音咦啼音題於是杜音杜齂音懈覂音俸閺音文玄默莫見莫聞務使此心無一情種擴然音曠㝗音朗猶必混跡塵世囂煩經種種境觀種種象而親與物游戲出入果無染著然後拜求玄關祕訣修煉三寶然所修煉固必除情尤須治心治心之法要將如何我施法乳女善哺之何為治心心兮本淸心兮本靜曠然閒然皆心之體我治此心須如本體淸如沇音衍水漻音聊然莫濁靜如谼音洪谺音牙條然莫喧曠如天地莫測其至閒如廣漠莫知其涯如是此心了無一物或如死灰或如止水死灰難然止水可鑑或如明鏡物過無形如如菩提為道之根明鏡常磨菩提時潤明鏡膽寒菩提心印膽寒則一切物皆遁心印則一切道皆生吾知無知吾見無見無耳無目無意想識如是無有至無無有然後此心無物可撼無可撼者是名坐忘既可與忘乃可授道可以通關調龍馴虎開基打汞若物未忘是能戰物弗能靖物欲希聞道中之祕訣匪為無益亦且有害是知聞道先殲渠魁何為渠魁七情是也尤必掃蕩其賊之巢復見淸靜虛曠本體毋使六賊稍有窺闞此為何說治心是也除七情以治此一心純一心以養其大丹然或作為不正之術匪惟昧道亦且眯性蓋所謂性乃天付屬故治心者為此性故心之必治性何可眯然則養性功弗可緩性何以養蓋此性者原於無始本之太極判乎後天後天之性有理有氣理分真妄妄失本真氣分淸濁濁昏固有既昏既失不可名性而曰後天若彼太極理氣渾然無妄無濁是為性天至於無始不可言性亦不為命非性非命何以謂性原於無始要知無始非性非命是為太虛一點種子此點種子種為極根於是有命而復成性養其根者養此種子然此種子恍恍惚惚渺渺冥冥無聲無臭無影無形於何下手用功養之養之之道先養後天後天之性有理有氣淸濁真妄一不可齊於何能養養之治之去妄澄濁去妄匪易澄濁維難我悲衆生指示此道先從此始何從此始惟淸無欲無欲斯真惟真無僞無僞斯淸淸則能明真則能體於何可以明之體之淸真之至無弗燭照燭照之明何道弗體然此妄濁當復何除閻浮下界妄濁相渾我為指示必須仚音軒然高舉㞤音岑贔音備無與世緣眑音杳坐睇膝莫見莫聞此心淸淨無一渣滓然後可以除妄而澄其所禀濁禀濁既澄此心淸淨更無客塵來相染著然人有心斯具此性既具此性豈能無情故治心者必除五覺以去五障乃明五性而通五玄何為五覺一無因覺蓋人此身靜坐圜內萬籟俱寂衆象未呈耳無所受目無所接湛然默默混混沌沌悶悶噩噩兀兀存存忽起一念挻音羶扔音仍縱橫如㹶音廷奮骹音敲如鹿斯奔上溢月窟旁極天根䟫音棖之莫得救之不能其為害道不為不甚故學道者先除此覺此覺何由可以除之除之之道去妄存誠一未然覺境所未厯事所未至便當放下庶使此心漻然而淸淵然而靜淸兮靜兮為道之根何忽無端先境而生未事而動萬慮攫搏百念攻擾及至履境接事應物殊為不然即使所念與之相合敝精勞神耗氣殆甚何如無覺委諸自然故學道者此覺不除難與聞道除此覺道忘境遺事打疉此心如太虛然一聲色覺耳之所聞目之所見妍媸美惡態度萬千自我觀之如夢幻然無奈不悟而實著之先意豫逆周張計畫憧憧擾擾紛紛紜紜吅吅音喧本體翳翳其陰如忥音戲如愚總弗能淸安究大道寧殲厥身故學道者杜聰黜明使主人翁常自惺惺若此覺存是為煩惱煩惱顚倒無有出期忐音坦忑音忒罔寧心君出舍必為除之朗朗靈靈無緣無因外內悉平以耳為目以目作耳縱極聲色不見不聞一過去覺貞吉悔吝情隨境忘何得何失何弱何强彼昏不知多事糾㤐㤐懘懘心莫寧戁音赧混混懮懮音幼無事而妄為之顚狂以此體道如泛杯船航東洋海無畔無援縋音墜一線綆墜千仞淵非惟弗得亦貽後患故學道者必除此覺毋為執著無為留滯渾渾淪淪無物不化更無妄覺以淆真覺一私知覺自作聰明罔由正道豈知私知害道尤甚𩂸音沉霾反覆汨汨莫伸非惟害道實斫性命故學道者務除此覺此覺不除雖除他覺究昧正覺夫此大道如坦塗然不從正覺以履坦塗墮入旁門左道歧徑千條百派混跡其中雖有棒喝鮮能悔悟雖有指南無復奉行四覺俱忘而存此覺終喪厥殼可勿戒乎我悲此士為闡斯言靜然漠然一循自然毋故作為失其本然何為本然此心之性性中之覺謂之真覺真覺之覺是名正覺正覺之覺乃為大覺此大覺者先覺是也不倚於數不倚於理毋意毋必毋固毋我率其本真任其自然上通三天下徹九淵明乎無始達乎無終微乎微乎玄而又玄道曰聖智儒曰通神佛曰寂照皆真覺也皆正覺也皆大覺也皆先覺也覺非其覺是謂妄覺妄覺不除昧真覺矣然除五覺尤去五障何為五障一曰魔障蓋此魔障或生於心或著於境或動於物或屬於身生於心者為人我見為榮辱見為得失見為是非見為强弱見為利名見為好勝見塺音梅賨音宗靈臺罔能解脫屬之身者疾患相侵饑寒相侵得意相侵苦樂相侵得適慵惰反復相侵囮音訛引糾縛動相忤觸更以履境有順有逆順則為易逆則為難入世斯易出世甚難乃復遇物美好盈前娛心快志意戀斯專如是魔障人皆有之學道之士不去此障死難聞道然此魔障一一去之又有疑障不可不知何為疑障大道易知大道簡能明師一點暗室之燈晃晃朗朗如琉璃瓶奈何奈何疑障種根一人談道衆口吅音喧𠱠音陵㗊音戢囂慫慂熒惑頓生背正即邪以僞亂真若處喬木下墜幽岑至哉聖言谷神不死衆妙之門大哉聖道虛無因應淸靜恬寧何用異說恣肆紛紜乃為疑障自惹邅音旃迍音肫可憐不悟終落孽因我告修士必正師承毋惑邪說毋走旁門淸虛淡定養精養神玄關玄牝黃婆嬰兒陰陽水火坎離乾坤只在方寸諸名何用諸色不存如是簡易有何疑團不去此障惑端叢焉然此障除又有理障此理障者害道愈甚各執偏障罔或達觀儒障在實道障在虛釋障在空障於實者執其偏理履諸幻境應諸幻事視諸幻身皆為實有役志勞神敝形耗氣以為此皆理所應為不知此言皆為障也若夫人生仁義慈惠忠孝節烈此皆天地浩然之氣執實而行未可虛視然使所見理解未融獨持偏理反落惡因煦煦之仁孑孑之義小忠愚孝儒門所譏况學道者嘆哉衆生為障於實每墮火坑無有悟者我為說法其靜惟之聖賢心印默識精參會通徹悟無一間焉障於虛者偏執其理一味頑坐淨其塵垢或且謂此道在是矣罔求祕訣涵養三寶雖曰致虛而實非道夫此至道不在於實亦不徒虛虛虛實實方為玄要障於空者執其偏理罔知真性徒談空空空非所空乃為頑空究於本來真如自在懵懵然也凡此諸障未能參同以致門戶參差不一反唇相譏視為氷炭儒議道虛道議釋空釋議儒道反覆譏議終無已時不知天地教雖分三其實一本為彼理障則歧視之嘆哉嘆哉實障則迷迷則難悟虛障則枯枯則無實空障則寂寂則偏滅古之聖人實而能虛虛而能實觀空不空空無所空是為至道參合而得惟落理障無由知之學道之士可無戒乎理障可除則有一障此障之根起於文字惟文字障實為心障五千祕言皆從玄悟作文字觀更失其旨乃或不悟墮此障中則有種種邪言曲說新奇可喜沁入心脾害性戕形即古至人立為真諦多屬寓言或曰坎離或曰爐鼎或曰姹女或曰嬰兒或曰龍虎或曰陰陽或曰玄牝或曰牲生主音注物皆寓言也障於文字多作搬弄豈知大道在精氣神養此三寶是養種子此種子者種為極根如彼諸說皆此一氣一氣之元即是種子認得種子諸說紛紛皆為糟粕食其糟粕抑又何為則此文字非道真詮以身體之一切可捐捐其文字又愼師承惟此師承為障之由尤宜明察遍訪高真指授玄妙不得其人則有終生身心障矣蓋彼初學於道夢夢一誤投師授以外道紛紛紜紜罔能徹悟奉為指南終生循之身心牢錮即有真人指示正覺心或誹之身或背之一味浮言以邪售邪以邪信邪於是種種障礙生焉故學道者愼擇高明去身心障此障獲除諸障濳踪諸障既消靈臺淸淨乃可與明五性之妙何為五性一曰水性一曰火性一曰木性一曰金性一曰土性土性多濁濁者多厚金性多斷斷者多果木性多慈慈者多仁火性多剛剛者多躁水性多柔柔者多靡靡易悠游躁易忍刻仁易和煦果易强勇厚易暗塞暗塞者愚强勇者亂悠游者奸和煦者陷剛忍者殘故五性偏功貴交濟柔以克剛剛以克柔仁濟以果果濟以仁土暗少智高明克之高明不克失用柔矣然此五性本於五行此五行者人身皆備其一為水腎之德也其二為火心之德也其三為木肝之德也其四為金肺之德也其五為土脾之德也命在於脾氣藏於肺魄舍於肝神居於心魂附於腎故修身者修此五德自全五性然而五方風氣不同禀賦斯異或受水性而生焉者則偏於柔柔則多慵受木性者偏於仁愚愚則多蔽受火性者則偏於剛剛則多戾受金性者則偏於果果則多愎受土性者則偏於暗暗則不明不明則離離則背道然此五行本於陰陽水性為陰火性為陽稚陽為木少陰為金土備二氣而實陰也然水為陰而實根陽故水之性內明外暗外柔內剛火性為陽而實根陰故火之性外明內暗內柔外剛木為稚陽而實陰生為曲為直曲者陰也直者陽也金為少陰而生於陽為從為革從者陰也革者陽也土為冲氣而為正陰凡此四者皆附麗之故其為性各寄旺焉要知五行精麗於天質成於地神附於人水曰智也龍濳其形火曰禮也虎踞其央木曰仁也謂之木母金曰義也而為金公土曰信也其名黃㜑然此五性不外五行而此五行不離陰陽曰陰曰陽本乎太極太極之極是為無極故明五性可通五玄何以明之生生尅尅水能生木則木母全木能生火則虎能神火能生土則命根固土能生金則金公從金能生水則龍身騰第不尅之則無所制故水尅火則虎不烈以火尅金則金不流以金尅木則母不衰以木尅土則土不陷以土尅水則龍不飛生而復尅尅而復生生生尅尅如環無端然後五行無有偏勝五行交濟五性斯全能知此者實明極理於此語以五玄之妙自可心得何謂五玄或曰乾玄或曰坤玄或曰法玄或曰道玄總為玄玄然此五玄不外陰陽而此陰陽不離五行故明五行則知五性既知五性乃通五玄通乎乾玄則知天道法其自然乃能無為通乎坤玄則知地理法其剛柔乃克交濟通乎法玄則知因應變化無端測之無朕通乎道玄後天先天有無為者乃悉其微為通玄玄上天下地道法精深罔弗知之知而無知而無不知無所不知而實無知是謂得道學道之士欲通五玄先明五性欲明五性先去五障而除五覺絶其七情驅其六賊而淨六根乃能通之然必拜求高真指示其中玄竅乃知開基安爐設鼎撰結三寶復我本體本體既立涉身三界施我法乳普度羣迷三千行滿八百功成自有霓旌絳節相迎上朝玉闕證位高真爾諸學人黽勉力行玉鼎真人讚大道虛無萬象空先天天在後天中三才結撰成今古二氣環生闢混濛六識淨時空六道三靈現化統三宗玉液金精凝妙象丹符朱篆泄玄穹寶林妙諦開元始靈寶精微暢道風一字宣揚皆棒喝三緘透發悟空同廣導衆生成巨典萬劫輪回入卷空繡嶺瓊花含妙解屾林靑鳥唱宗工天心見處茫無限地軸回時萬法雄漏泄玄元真理盡普天法鼓震羣聾至道極玄大乘度劫三品真經中卷蓋聞天地一氣絪緼化生萬物惟人為靈得理之全得氣之正貴擅天爵富有良能尊於萬物胚胎羣生失此幾希喪其本真異於萬物而墮其倫全之為聖保之為人安之則大化之為神參諸天地三才鼎分故知此身得之甚難失之甚易匪惟甚易一失永失墮諸輪回無有轉日我為道者重示五玄其諦聽之天之蒼蒼彌綸布濩有形非形有象非象是諸形象本有定色此其為實然論形色恍恍惚惚實無定象冲漠無朕何虛如之惟虛則靈惟實能覆虛虛實實變化極神故通乾玄乃知虛實乃弗滯凝法其自然運化從心周還無息大丹乃成地道敦厚懬音矌㝗音朗無垠上虛下實萬物資生上實下虛萬物歸根虛虛實實與天長存體也艮止用也流行山現妙質水顯妙神質以載物神以鍾靈無神無質無質無神神行質受質以神行虛實交濟妙合一凝學道之士克悟斯旨剛柔合德虛實相生故通乾玄復明此因乾坤定位大丹乃成若夫道玄匪假言說將以為實何實非虛將以為虛何虛非實將欲言其虛虛實實實於何在虛於何明虛中之實不可名實實中之虛不可言虛實莫為實虛莫為虛莫為虛實而究不無虛虛實實而究難言虛虛實實微乎微乎不可為虛而實是虛不可為實而虛本實不可以言虛虛實實而實不外虛虛實實至哉道玄無所名象淵淵其淵難探厥旨故悟斯玄丹九轉矣至於法玄受之師承原諸天命流行坤輿大道既成法極神妙變化由心神通莫測天地一囊日月壺中芥子須彌大千毫末揮斥八極塵視六合乍合乍離倏無倏有入幽出顯虛空泯漠驅神役鬼雷電交作謂之為虛何所不有謂之為實何者非無得心應手心手相印心無其心手何所增不於手得隨心而運變幻無端天地為證微乎微乎生生不已惟通道玄乃臻斯詣故通法玄道斯成矣其一玄玄無所言說並絶思維微妙恍惚極於希夷更千百劫未有傳者我今為世敷揚此旨爾諸弟子其諦聽之蓋此玄玄在昔元始天尊言之竊聞其說自天而上至無量天中有至人玄之又玄天為之宰地為之攝人物幽明咸會諸極運化古今而無轍迹主持劫會而無端倪聖不可聖神不可神無無無無無而亦有虛虛虛矣虛而亦實聖不見增愚不見損天位乎中天亦不知地承其流地亦不識極一切物皆運不覺其存非存其過非過斯其玄玄從何擬議從何想像若透斯旨玄而玄矣夫此五玄通之匪易學道之士究參厥旨屏棄一切濳心討探玄解超然冥悟獨契深晰精微始覺本真歸來祕鑰丹鉛自具爐火抽添無煩異授陰陽定位龍虎交調不事搬弄自然而然若弗明此客塵染著六根主權七情孔熾墮落火宅安究玄微我今開說誰復能悟則有種種異論紛起分門別戶各持一端反唇譏誚始猶執理互為攻勸各存一見持論立說要皆為道左右保護雖或出言不無過激明道之心總屬公誠其流既遠私弊叢生彼此相擊各樹黨援名為衛道而實為已究所從來皆門外漢嘆哉嘆哉此種之人在儒為腐在道為賊在釋為孽其為夢夢有何殊乎豈知三教本出一原會通斯旨並可不立羲古以前有何異趣宣聖誕生太上現化所參同契性道昌明為一為出為一為入入世之教先敦倫常君父尊嚴臣子忠孝兄弟孔懷夫婦造道生育種類乾坤萬古誕養羣品天地為補化機不失造物是輔斯教不明萬世聾瞽物盈土滿洪荒之初世界混茫上下失怙故知此教為道之倚然溯其始詎可擬議惜哉至教久乃不然窮通貴賤貧富高低大小强弱多寡彼此名利時勢束縛塵攖流浪生死顚倒相尋爭奪攘竊詭詐環生計巧百出以術愚人奸雄間發濁亂人倫相結以勢相傾以能舌鋒肆起是非莫分往復駁辨同類相侵各樹赤幟一理紛紜一見為此一見為彼相同者附相異者譏莫分莫辨得失是非莫究厥旨莫晰厥微豈知斯道異中之同同中之異異同之中更有同異是非混淆得失舛亂逞其臆說不顧道理雖同一教譬如讐敵不攻不擊一息不寧誰復平心公論罔爽嘆嘆要言何人解悟嗟彼同門猶如是險况其他乎且又有說人心之壞壞於文字以文字學則工於外一切語言咸崇粉飾粉飾之辭專心於外心乎外者必遺於內心乎悅人必至忘巳心乎傳世忘乎自治心乎蘄勝忘乎自斂心乎誇博忘乎反約心乎綺麗忘乎矢誠巧僞日增本質日斫蓋文字興性命理微可不戒乎可不愼乎吾嘗聞之天文燦爛昭於河漢地文絢熳草木變幻人文璀璨樂和禮辨皆出自然無故巧飾至文不文文出於實出於實者文斯為至後世多文亦如無文文非無文為文非文非文之文文實非文更可嘆者習於文字無乎不聞聞非所聞醜記狂博至尊無文至親無文皆以文行巧僞生矣本非忠孝文為忠孝本非友恭文為友恭放肆閨門作為綺語凡諸所為敗間蕩檢以文文之以致流弊禍及椎魯皆為污染變質而文即僞去真反朴而巧機械輩興衆生無恆匪惟不忠不孝不弟不慈不正而且有甚奸盜詐僞顯為不法鷙狠柔惡陰肆毒謀古道不存今生罔悟江河下逝無與挽者儒教失實其流所及愈遠愈紛愈僞愈亂猶弗自悟結社要盟互相標榜動生毁謗矯誣上帝喝佛罵祖欺滅鬼神譏訶釋道正教正宗誚為異端仙經佛典斥為邪說謂道謂釋毁棄倫常豈知謬論神天共憤抑且流禍斯世斯民此何以故蓋此儒流為民之望表之不正影愈邪焉然此之輩皆係小儒為腐為妄若彼大儒則必不然大儒所見直窺本原知儒之道與道與釋同條共貫無有二者儒與釋教總原於道道根於性性仍於天天無二理人無三教教分於三從後起見溯原究委有一無二大儒知此罔所分別各盡其道事君以忠因分自盡事親以孝竭力趨承兄友弟恭視處何位造端夫婦以正防淫事神維誠洽人以仁愛及草木恩被蟲昆畏天明命履地惕乾無慚幽獨克承以謙知道變化教匪一端但辨邪正無妄譏焉是為聖賢道極於天作君作師經綸參贊君臣定位父子分嚴友恭道立兄弟情連夫婦道正陰陽無愆天地以位萬物熙恬風雨調和寒暑以時嘉祥洊至沴氣以除民物仁夀仙佛何殊生為世榮終歸上淸立極天人與天地存釋教淸微肇於浩劫觀空以空虛無寂滅昔有至人名曰然燈立於中古轉大法輪教化度脫無量衆生佛傳始盛次有佛出號釋迦文自種民天降神部洲是時周昭甲寅之歲西印度國有迦維衛其國王者名曰淨飯四月八日太子斯誕三十二相八十種好以夙願故舍國修道雪山六載精思苦行鵲巢於頂藤穿䣛脛臘月八日覩明星出豁然超悟具六通識負龍象力開來繼往闡教西域初於鹿院繼祇陀林黃金布地佛教崇興四十九年應化不一是時比邱暨比邱尼并優婆塞與優婆夷凡數千人俱同聽法無不得度有舍利弗智慧第一佛嘗因之宣說法要有大弟子名大迦葉得佛心印傳佛正宗佛親授記是為初祖又有弟子名阿難陀多聞第一於佛滅後傳佛教典流布人間今之佛藏皆所宣傳延及達摩以大神通一夕收攝三十六處邪魔外道設洪誓願自西印度厯恆沙河至南贍部說法演教宗門大展授祕密旨從超悟得明心見性佛法無多一切掃除片言隻字參悟本來凡諸聰明聞見知識杜絀不事渾渾默默頷領宗旨悟諦因緣無無所無空無所空內觀此心如虛空際如千江月如鏡如泡如花中香如是空空以無無空故無所執一字之妙通達無礙前無無前後無無後匪由聞見玄覽超忽任諸見聞頽然自喪以因緣故得無因緣禪宗乃熾又有厯代諸大法師通經律論取大法藏闡譯文字搜剔妙藴傳諸三千大千一切闡浮提界廣為衆生說無量因解諸煩熱化淸凉境拔諸苦惱離火宅厄濟諸幽魂脫地獄趣化諸六道獲天人樂利賴無窮象教以昌流傳既久厥旨無聞凡彼細流罔得真傳東西剽竊言語為宗機鋒相對口舌爭雄所謂禪者闡演祕奧認本來面無用浮飾若其流弊貽害後人迷失真宗纍主人翁出離故舍入無何有渺茫漂泊墮野狐禪迷妄狂悖呵佛罵祖儼大知識抑又甚者謬妄罔悟以訛傳訛訛以訛承我佛如來法法何法為究本根故空諸法文字不立非去文字恐後學流求文字中昧失本來故去文字豈知文字正難盡去去文字者曾何沿流但執文字作文字觀弗從文字究佛祕旨離失真宗是文字障斯害道矣更可憫者罔知是經是佛心印流傳人間為彼衆生廣說要法俾有解悟即彼下等愚暗不明資經懺悔原令此輩生恭敬心朝夕諷誦久或明生了生死念力諸善行脫輪回趣或悟精微超諸上乘非第口誦無悔悟心便可宥罪即假口誦亦獲利益是彼誦時生大歡喜高吟朗咏令諸幽明一切衆生邪魔異類幽魂餘孽得聞是經普沾勝利咸䝉濟度非說是經但假口誦無持受心無恭敬心無誠信心無踴躍心無均利心無無私心乃為誦經乃獲功德自流日下日下日壞一切佛典指為衣食誦經之家以虛文求誦經之人以虛文應一切衆生以虛文故故輕是經而諸佛法罔有存者要知是經具大解脫如淸涼風化諸煩躁如摩尼珠化諸煩惱如般若船渡諸溺者如波羅密到諸彼岸如漆室燈燭諸幽暗具此種種無量利益但作文字草草看過便如糟粕曾何所賴以故禪宗知此等故掃除一切冥心內觀空內外相寂坐玄默領一參頭究極旨趣有歸於空空無所空以無空故乃明斯旨若住暗室張一熖炬無物不見無不明朗罔所障礙無障礙故心體備具性天完足與天地俱不為物囿不有於物斯之為梵梵音淸徹幽明交濟斯之謂禪禪理淵微天人悉究究厥旨者佛菩提種如是如是西來大意作如是觀佛法盡矣若夫道者開於元始示諸祕旨流衍玄綱道爰生法法傳靈寶顯無量應金科玉律運御乾坤統率神人但彼衆生罔獲聞道道法無傳太上降生厥多神異聖母誕育從左腋出脫胎靈舍於祥李下鬚鬢皤然指李為氏八十一年始離母腹與尼山聖及雪山佛共出一時為三教祖統御萬聖傳法無疆五千餘言言言妙諦隱柱史中開化羣倫罔有契者紫氣東來靑牛西度有一善世關門尹喜夙悟真玄未獲其旨覩兹靈跡知有異人自關而出爰矢誠悃膝地俯首向座乞法道德祕文親相授受傳諸後世為道宗旨入世出世得聞斯言利賴普被領其旨要長生天地與諸浩劫脫諸度趣超證人天隨乾坤位匪可年計與天地同不與天地同其荒老逮後闡教八十六度度諸真人超證玄理道法廣布為諸神仙被以梯航能悟之者靜坐圜中淸虛寂淡悟徹本原一切作為搬弄偷換舉不屑為自獲真宗爰正天人得無量果逮後道傳淸靜法門罔或繼者於是則有修命之說分合陰陽交配水火取坎填離透闢玄關開基打汞安鼎起爐煉氣鎔精鼓舞神元撰結金丹涵養孕育爰受靈胎以成我相是以後天諸種種功復還先天本來真體雖於太上道德真詮落歸第二然亦修行正法眼藏乃其流遠支派愈紛遂有種種旁門左道竊其餘說創為邪論充塞正途則有採取真陰以滋鼎鉛採取真陽以益鼎汞則有一種偷陰換陽吸月呵精以助之長於是邪人妄附遁辭乃置鼎器損人利已更復猖獗造諸惡孽巧誘無知誤墮惡術迷失真宗喪失性命永劫輪回深可哀惻復有一種妄意大道其人亦知此種惡業乃求正途未獲真傳求諸紙上一切陳言誤認糟粕以為法乳遂有靜坐屏氣凝神於子午中抽添火候豈知玄關一點真竅本位不明從何能透乃至升水水不可升提挈真陽出離本舍無復收攝較諸枯坐一無所事其禍慘烈豈知大道止在淸靜一有作為弊叢生矣夫此大道原諸無極為太極根生陰生陽造化羣品養育生靈功用浩博本體如如無形無像無色無聲無臭味法以無所無故無所事淸虛淡定寂靜逍遙乃於本體無所障礙以無障礙故無損壞以無損壞故無所失以無失故道體具足本體圓明妙用顯行變化莫測因應無心通諸幽明涵諸天地貫諸古今昭諸人倫無終無始無巨無細無乎不在無乎不行出有入無為物祖根故知遡流不知窮源得其源者厥流斯晰若究其流雖可得源然流斯極功反多緒以故至人言淸靜教在於玉局開示真玄無他作用獨指本源俾從玄超掃除一切大道乃明明大道者無所用心而實此心以無用故乃無不得無不得故乃無不通以無不通是為真人待斯真人衍斯妙道無奈風會漸漓醇悶以斯風會生斯種人以斯種人習斯種教宗儒教者斥釋與道縱其論辨止道其迹未悉厥原故所辨駁自多敗缺夫究極旨儒者此命此心此性道者亦然釋亦同然其始賦受無有異者其中功詣或有不同為儒為實先致其知致知本虛乃求諸物格物為實物情既晰本知斯致知體既徹洞洞怡然五官之宰如如照耀罔所蔽焉心君泰寧天命在我夫此性命三教合一豈惟儒流克明厥德為釋亦然但其用功各有師承佛教言空故小聲聞以斯聲聞落第二層此何以故蓋聲聞覺弄精神通用變易得以斯所為若或誤用易墮他途反失佛性即無所誤而尋途轍終有所係其於佛法超然冥契不存些子罔所𦊱礙究非厥旨故於文字一切掃除獨尋真宗真宗既徹萬化通焉維彼聲聞即是格致維彼參悟即是誠正誠則必明又何所事格致之功蓋知為道為夢覺關而誠與正人鬼攸分既意已誠是脫鬼趣超正人天格物致知曾何所用是釋入門途徑較捷而儒之功較佛為密然而成功則一而已若夫吾道本於無為而究其要無所不為參論玄契博觀廣攬以究本原本原既得無所事焉是其用功亦參格致第所格致與儒微殊而所參究與釋微同異者不殊同者不一然溯所以曾何別乎是故三教鼎分角立而不可無微乎顯乎有一無二儒以治世道以濟時釋以其教主持斯世為度衆生普敦盛會自開闢來人皆宗儒人皆修道人皆學佛為聖為賢孰臻斯詣為仙為佛孰造其極習儒教者儒冠儒服儼儒中人而實非儒博聞醜記獵取聲名修已之業曾無所事反諸幽獨負慚多矣心地不明誠理盡喪揆之詩書所踐何事囂然志氣高談闊論動引昔賢巧為依傍而實大誤以墮本來是諸儒者發淸靜心無墮惡因無人無我各盡所事踐形復性克履厥言於君盡忠於親盡孝友愛恭順信實不欺慈以接衆仁以育物不驕不吝虛中善受不侮寡不虐無告不貪不淫不拂本性道之真仙釋之古佛不過如是如是之人乃能祀神神即其人乃能奉佛佛即等倫不假修鍊道體永貞不假參悟佛性圓明不假養氣大丹自成不假知悟禪理印真在天為天天尊其名在人為人人共尊親長存三界爼豆斯馨萬世永賴三教師承是大聖賢為萬世尊出入陰陽理治乾坤上覆下載悠久無倫佛也仙也釋也道也無乎不奉無乎不欽不生不滅無等無倫三教宗師一氣歸根爾諸弟子信受奉行玉函妙相真人讚解徹玄玄妙三教總歸宗一元開闢泄宗風道法啓鴻濛萬象咸空奧典利無窮守中道人補讚三品真經闡至道大乘正教啓瑤編人身亦有三淸境無極太極始純乾三才天地人即道朗朗分明日月懸箇中一點玄關祕無見無聞象帝先無無不無是真無真常真如乃真玄三教之根道為本水流何得忘厥泉孚佑上帝大道祖觀音說法舌生蓮能繪水聲暄日彩曲闡微妙何淵淵不是神仙十種法不是空宗無相禪三淸聖境如來地一一直透覺明圓始認天樞真關竅繼達靈寶禹餘天現身說法心法現藩籬妙有不拘牽是空不空祖劫內非有亦有威音前一黍米珠藏世界七還九轉好精研妙空妙無人難會谷神不死此真傳立定天根圓法像玉淸高躡斗牛躔巍巍功德慈悲祖無量光明照大千飛騰變化難思議尋聲救苦般若船七覺傳經開萬派演兹三品結良緣合八聚五成十六偌大金丹分量全千淘萬鍊鍊復鍊金仙方是真神仙至道極玄大乘度劫三品真經下卷大道之根原於無始生天生地生人生物無乎不有無乎不存或靜息機或動行神出有入無為萬化根入幽出顯為造物心古不為古匪今斯今微乎微乎不可以名名之為道亦起於人我聞在昔太極未闢一氣混淪陰陽交雜混混沌沌天地倒亂五行紛更乾坤失敘日月無明人物銷鑠世界咸湮乍無乍有若浮若沉惝恍渺忽汨沒紛紜或上或下飄蕩無憑是諸上聖仙佛真人帝天神宰祖玄高尊一切金剛不壞法身遇兹劫會感化邅迍以兹銷鑠漸喪其神形神互化罔保元真一失永失盡撥本根萬年苦行纍劫良因以斯厄故無與為存中有至人名曰元始憫兹劫運大顯威神攝諸帝釋上聖高真暨諸元宰佛菩提根一切聖神納諸黍米珠中藏之又復收攝萬氣祖根於一指甲奉與至人號曰無象納諸玄竅經三萬度厯一大會涵養孕育哺以玄氣運以神精轉以靈胎煦以元意由子入丑大氣初凝玄風漸鼓元宰陶鈞始乃一氣上浮氤氲於是淸輕凝結渾灝環轉周輪如是輪轉經三萬度無所停息轉轉不已漸次淘勻而斯一氣纍落渣滓漸結為地維重為濁綱維八極粗者為峙淸者為流以兹流峙鎔化山河凡諸一切五行本質各以其精撰形成色遍布堪輿互聚元氣永固坤貞維彼昊天鼓舞盤旋一氣包舉重復凝精以斯地道亘古無傾與天對待化化生生上者施與下者順成靡終靡極或載或成無疆之化天地成能以斯天地交感化生內出盤古是大至人憫兹宇宙混沌不淸氣機尚塞化育難行為此之故特顯化身一晝一夜七十二變變諸種類各肖其形終變妙相厥體具均頂天履地是名為人得理之正得氣之淸得精之妙得神之靈乃為三才角立鼎分可知生天生地生人生物各類無乎不肖無乎不神非此至人奚能有因是此至人秉教無象御居玉淸極之恍惚無可思議淸微之境主持一切天道地道人道魔道水澤幽冥輪回六道檢閲劫數推運乾坤主持天人仙佛真宰黜陟超證因緣果報御攝提格大荒落界無思無為運化無心以無無心故無無為以無無為故無無形無聲無臭無等無倫無無無法亦無無名無𦊱無礙無無無情以無思議至無無神以無神故無所不明無所不屬無所不行化無不化育養適均是為元始居於玉淸端拱玄默運化古今淸虛寂定杳亡杳存無物不體無息不生主宰玄要同歸始靑厥生在木厥成在金禀象離火坎水䝉屯歸極戊土中和為君出大神咒燮理六陰陰靜而動陽極斯伸一陰一陽五行聚精妙合闢塞虛空涵凝是諸五方配諸五行各有一帝各居其心各司厥職各運乃神各奉玄令各奏厥成是諸帝屬各各有守以宣元運以布皇仁而此元始以無量身度無量劫保固元氣任數推遷無意無必妙極自然是此元始居玉淸中運無量身極大神通分身應化各以其神入居人身各各一頂各一元始寓居其中為一身主為萬氣宗是此人身各以所得元始化身各顯神通極諸不可思議之時無所侵害無所危殆無生無滅無動無靜神舍安然無乎不注以斯之故故雖劫運更代遞嬗而此玄宰仍無毁壞各以其所分化化身復歸玉淸還集元始得匪所增仍圓妙相故知元始統於一元一元分化極於萬象萬象森羅總歸一元一元變化無所端倪無所思維靜極而動動亦如如動極而靜靜亦如如一動一靜一靜一動任諸動靜或分或合或復或離無不各有一元始相各以其相各成妙體各以其相無假收攝各復本來仍歸一體而元始相尊居玉淸微乎微乎是此玉淸聖境莊嚴在大羅天極無上上至無所擬於無能名至虛至玄絶頂之處非具金剛純一妙體極無所上功德苦行為諸天尊至尊真人望瞻翹首渺忽莫憑終無由至以無至者故其玄境微妙莫測但以劫運循環往復皆所禀受是故五老偕諸真宰上詣玉淸請授要旨乃見元始坐玉淸中法座莊嚴天所希有是諸法界無有等者淸虛廣漠寂淡逍遙衆所罕覩俄見其天五色並麗忽有罡風轉如車輪運行廓外而此玉淸化諸億萬莫可度量此億萬天各各現化一元始尊出衆妙音如一妙音普為上下帝釋真人說衆妙因解消厄會躋斯衆生或脫苦趣詣玄都境講說因緣蓋此因緣原諸浩劫為諸天宰此種微妙匪可言傳惟在學人各以所得論於元始剖析精深至哉斯境包含周遍罔有外者是諸天人欲觀斯勝惟絶思維端居靜默趺坐凝神空彼衆有如無此身如無此心懬㝗浩渺如虛空際神閒氣靜息機於密則有妙境從坐而開是諸玉淸一切勝概星羅碁布森然具現而此元始應化化身端拱玄寂坐法座中現諸法象與吾神接蓋此元始一理撰結萬氣歸根至真無妄為無妄者乃見其神微乎微乎非虛非實若有若無無耳口鼻無聲色味無意想識乃契厥微而獲覩之自玄教息無與言者我今指示玉淸妙道學道之士克體淵源屏絶思議默玄靜悟心不著物以無無意解祕密因參同妙契於活子時調息氣機萬神攝伏外內太素攝諸法象咸歸無有入黍米珠觀諸天地現一切法日月星辰山河嶽瀆萬昌億類大千世界一切形聲色相體質無不具足外相淸好觀者各以其意得之出八極外立乎天根見諸天地如一脫粟是諸色相各於微塵剎中現之無所不有而實無有是此玄微曾何擬議至哉微乎誰造其極我聞元始為闡此妙極於無為觀空非空空無所空視有非有有則俱有惟空不空而實空空惟有不有而實有有有乎空乎空乎有乎空中之有有不為有有中之空空不為空空其所有有其所空是為真玄玄而又玄寓諸天中為天地根寓居人中為人身祖修性修命修道之士修此祖根祖根完具萬氣俱凝氣歸於命命統乎性性也氣也命也道也玄也真也祖也根也是為元始玉淸妙道夫此妙道傳於元始元始下傳歸本玄要此玄要機藏於玉淸淸微宮中紫霞錦囊非真真人夙器深重道根淸淨未可與聞乃者至人法號靈寶憫兹下士未獲聞此至玄道妙纍劫經生無由解脫至於終極輾轉輪回爰現法身在香林苑闡演靈章金科玉律運化乾坤拔度天人利濟羣品拯救幽魂是諸妙法廣布閻浮流傳濁界依法持修超證妙果遵律䖍行普周六道然此法典金格精嚴持修之士非淸淨體非淸淨心非淸淨行莫究玄微蓋斯妙法變化無端極恆河沙亦難比擬上通於天極天外天至無極天乾玄之天乃無所象並無能容無非是法所周流處下通於地極諸扶桑至虞淵谷及於地所不載之處無非是法流通環轉放而行之彌於六合卷而藏之退歸於密云有非有似無非無象則成像空亦如空匪可思議究何言說本之於心應之無迹來鮮端倪去仍罔極視之不見聽之無聲造化由我天地為因因應匪測度數莫尋微乎妙哉無古無今無等無倫淸虛玄密罔所由明惟此至人以至玄道演至玄法流通宇內雖至愚夫獲聞玄訣咸得奉行無有弗應無有弗靈無弗如意無弗從心故知妙法無有不欽無有不伏無有不承究厥由來本乎至真真實無妄萬法歸身以身體法以法衛生生生不息法法斯神神明變化極乎無因在閻浮提為法之師鬼神敬禮天人悉欽宗風以震役御雷霆呼風喚雨救濟羣倫驅邪縛魅宇宙澄淸人倫以正道德昌明入無出有法法遞承至道法備德行崇深功業廣被神歸上淸若夫修士苦參玄奧養氣鍊形則有魔王統率眷屬來相侵擾乃仗斯法收服邪精爰無所侮克究玄冥無所恐怖無所礙滯無所障蔽乃克悉心鍊氣鎔神故知斯法保護諸道無能外者然此妙法是靈寶尊在上淸境親受元始玄理所撰匪可易得靈寶尊居上淸之境禹餘宮中手摶太極分陰分陽以奇變偶以偶成三以三化萬至億萬萬以及無算還以無算仍復一奇歸諸太極無所虧缺亦無詿漏並無盈數以斯之故睇觀玄微知此至道各寓妙法乃以所見即成是法故知是法皆道之髓非體道者是法不傳微乎妙哉我昔幸見禹餘聖境居天之心其色炳耀其象昭明其形空闊其體淸淨無物不有無理不存紛紜雜遝萬象森森靜無所有而無不有動無不形而實無形千真萬宰聖賢仙靈佛菩提衆罔不在焉下至凡夫愚與不肖莫不各各有一靈寶至妙至玄無極變化至神明法惟落後天生種種障障蔽靈臺致使一切妙法神化無由著見久乃汨沒愈失本真本真既失萬法湮淪悲哉嘆乎一失均失無有存者墮落火坑因仍流轉與蠢動同詎不悲乎夫此上淸具神通界境致昭嚴其所具設無不華美而禹餘宮色相莊嚴上懸華蓋有五色雲四面繚繞放五色光照燭一切大千世界皆成五色祥光瑩徹無有隱者其中復出微妙異香化為氤氲和藹之氣遍布諸天諸地之處一切天人餐是玄氣皆各滿足無有厭者以斯勝概集諸天人咸至其下俄見上淸聖境廓開現諸樓閣琪花珠寶玉樹瓊枝仙禽異獸各各一名罔可形狀又現一切殿閣樓臺金碧焜煌霞彩燦爛一切真聖玄宰高士星冠劍履環珮瑶琚往來出入各顯妙相復有天真玉女之輩霞髻雲鬟瓊珮彩裳各捧牟尼寶珠一粒環繞道前忽現天尊神人之像猙𤢆奇狀各執利刃弓矢戈㦸現三首眼各能言視化六手臂各有捧持環立拱護變化無端是諸天人遠觀遐矚音竹莫能相即讚嘆希有無有異者夫此妙境罕所覯聞罕有能至至玄至妙幾絶形容豈知此中更有玄奧挹其玄奧真為莫測太極渾涵萬象具足以一黍米藏諸世界以一芥子納諸須彌以一毫端建諸梵剎以一微塵現諸法像以一竅聲化億萬聲以一孔氣變千萬形俄而日月任其盤旋俄而風雷恣其怒號以有為無原無而有非真非幻造化無方是諸靈寶出大妙音為諸真宰啓諸道藏宣說靈妙無量之法傳以淸靜不二之儀金符玉篆科律森嚴傳授祕密無上心印金章玉質丹黃妙色無極玄文轉授天人流布塵世依科修奉乃者天尊慈悲度劫各以所得靈寶心印妙法真傳金科玉律下度人世遇諸真人道德崇高可與授者遂設玉局親相指示廣被遐裔流諸後世罔敢不遵緣是慈腸遂各苦行以衍無疆厯千萬劫保固天地燮理陰陽調和元氣養育羣品利賴幽明超證神仙安奠五嶽建宰五方化及草木莫有異者是此妙法天子得之建太平治諸侯得之立齊治本士庶得之厥身以正鳥獸得之厥性以靈昆蟲得之而全其命草木得之而遂其生山川得之而鍾靈異湖海得之而儲其神修道之士得此至要正位天真儒流得之而文明盛釋氏得之而見性真凡諸無情無聲無色得此妙法各悟原因幽冥罪衆得之而永脫乎輪回故知妙法無可思議無可想像無可言說無可指示以我觀物以物觀理以理觀數以數觀天以天觀道以道觀法因法成象因象成形因形成質因質成名因名成物因物成人因人成教爰有太上宗靈寶法垂範後人故知上淸真境妙法開道德教無窮無極豈不微乎豈不微乎是此太上原於元始傳於靈寶降生塵世示諸靈異聖躬誕育鬚鬢皓然凡諸語言文字玄奧無用師資各體其要各會其微浩劫之前一切因緣各各明了浩劫以後一切道法各各貫通上極於天上天之載一切玄微各各徹悟下極於地至於幽冥一切祕密各各了然中極人事倫常道德禮樂國政度數文章至理淵微至道玄要一切宏綱細目端委各各通達心心印證至聖尼山深相讚歎古今希有以斯絶倫妙質殊才諦觀玄微具大神通無邊法力憫諸衆生罕聞大道如聾如瞽盲心昧志爰闡靈章極五千言發揚道德淸靜無為至玄真要奧理昌明教法廣備罔有遺旨爰有至人誕生其時隱諸下吏為關門尹法諱曰喜生而靈異聰慧超羣一瞬息間千行俱透博極羣書廣參玄奧惜乎無傳一間未達爾者太上放大毫光照燭是處産此異人實為道器可傳斯旨乃駕靑牛西度函關維時至人默坐玄眄音麵知有真人自東而來爰伸積愫長跽道旁丏求玄祕是時太上知是傳人乃著道德真經授之是此至人言下大悟豁然了了遂得天地不傳妙寶永垂至教被于無疆因著文始真經九篇闡揚道德太上以斯妙道有傳至教已立後世永賴乃復一氣歸於太淸大赤宮中為道宗師是此天宮在太淸境為諸天地玄關至奧一切天尊帝釋真宰聖賢仙道佛菩薩祖皆從此天印證玄奧得聞斯祕乃可得入大羅仙班是兹天宮為玄之鍵一切有為無為至聖至神真人如欲得觀靈寶妙相乃欲更進仰窺玉淸聖境莊嚴必從是天經厯玄妙或幸得睹是此太淸為神仙都凡諸境界一切勝境光景逈異是諸異卉奇葩香艷炫睛搖目素所希見復有山陵溪谷怪石異木靈巖絶壑藏諸珍禽異獸虎文豹采墨麟白澤靑鳥赤鳳之物種種不同變現靈異各有殊觀又復各現雲臺方丈綺閣雕楹朱甍畫檻白玉為街黃金甃砌五色寶石遍布諸地其中復有上玄真宰天尊大聖羽士黃冠金童玉女各佩五色雲霞之衣從容雅步出入逍遙自然快樂內復有諸天神雲將或御虬龍或駕赤虎各執寶械環衛諸天是時太上默坐睇膝無所宣示爾時五帝長跽音桂几前乞法垂教俯囟恭恪未敢遽起太上慈顏忽爾開霽乃為五老指示精微慨爾言曰吾之至教久著一經名曰道德授於尹喜傳流人世依教持行登證仙道是時五帝各白道前是此道德淸靜真經幽深玄遠下士修道罕窺其密伏願聖慈示以玄要爾時太上為五帝言此至真妙道之玄微匪可口授要諸心參若或求諸語言之間人皆泛視不由師承妄為臆揣多墮旁門故第言其淸靜無為收攝一切客塵妄動然後示以至道玄微之所端倪俾其漸悟默會真玄今爾再四求指其要我為言之子宜靜聽蓋此太淸居天之中為天樞紐名曰玄關生天生地生人生物皆從此天先地而生有此一天然後氣通無象之始因無象中一玄妙理藴釀元氣乃獲長保先天後天暨諸天地山川人物若非是天圜轉生化氣機遂息故諸仙佛聖賢真宰非通是天無由會見玉淸聖境此固修士道德具足之時所宜急講者也吾昔於世以我觀天因見我身亦有太淸至玄之境其中玄關統攝諸氣先天後天咸於此判分陰陽界立水火門上不於上必通於下下不於下必通於上上下相通必經是關左而會右右而會左必通是關然後歸一引陰交陽必度是關引陽濟陰必度是關是諸真水度關濟火是諸真火度關濟水渾水火而共出一原會陰陽而歸於太極判極為兩合兩為一總會此關無有逾者然此玄關居臍之中非上非下非左非右非前非後非淺非深盼睞二氣默會神精始由下被終圖上升匪虛匪實匪形匪聲形聲俱泯象態難名凡諸修士趺坐屏息澄淸萬慮調伏元神內無物擾外無塵攖任彼一切有情無情魔障相尋中有所言亦各無心極彼分擲不見不聞如是淸靜無所緣因乃得默運真元之精由於氣海上至太淸自太淸境遍厯周身一切法界至於上淸禹餘宮中經乎氣機至出納司上會玉淸還乃下濟至於太淸大赤宮中與諸一切三寶法物融結成境渾為太極先天之妙開基空闊納諸眷屬無有遺者爾乃得以收攝元神居處其中各家眷屬環相圍繞如坐鐵城如入奧室如登極頂如入廣淵罔有見者是諸天宮更現光景供其娛玩復獻妙飲瓊漿玉液供其啖食復有祥光四面繚繞照燭一切無為法界是諸真宰羣相引導香花遍滿供具各足乃獲登於大羅仙班是此至要總極玄微匪所易得爾諸五老各以其身保護斯人得正妙果我昔聞此至玄要道以為此身此心此理本之三淸還乃以所始得之身仍從太淸詣玉淸境是則此身與天無異三淸妙道取之於已各各具足無或闕焉但此妙道傳於太上至精至微至玄至奧雖及顯揚初學之士未獲師承無能致力我今於世廣施法乳開方便門示以捷徑為彼三教各述良因俾爾後學按法習行雖於至道未悉玄微然苟力行亦或有得是諸弟子剗淨異同人我之見詳視審聽無生障礙共證是因蓋人一身惟精氣神固精養氣心神安寧藏其玄宰無俾喪傾然此功要先淨六根六賊既伏七情無因既無情識乃無煩惱以無煩惱因無情想以無情想因無妄心乃得此心淸靜無為若太虛然無所不有而如無有無無有故始無所障無所障礙乃無不靈惟靈斯神惟神斯通通無弗通遂明玄奧我示修士先須主靜欲靜須誠欲誠須敬欲敬須愼愼無妄言愼無妄動愼無妄意愼無妄因至無妄因雖厯煩雜嘈沓之處罔有妄者以無妄故內斯寧謐主一無適以存其誠如是存誠乃與歸靜靜之之極明自生焉由其能明是以能行儒者敦行一切倫常罔有愧怍則可入德希聖希天釋者能行觀空得空而非頑空求佛於心以心印佛即心即佛即佛即心相彼如來如是如是道士志人能敦厥行始以其神御諸元氣既以其氣收攝其精精足則一切氣皆足氣足則一切神皆足神足其氣氣足其精精足其神如是具足大丹乃成是諸三教分門別戶究所由來皆從一極尋原究委則彼歸宿仍會極中匪惟始終歸本太極無二無三即其功行由知而行由敬而誠由誠而靜由靜而明由明而神其中次第無所紛更惟彼儒者多事格物其教為實惟彼釋氏從事靜參止明性體超乎命元其教為空若夫道流性命雙修先固本根後參玄要虛不為空實不徒實故其為教合天地人無有外者至哉道乎立於無始生天生地生人生物運化古今磅薄宇宙入幽出顯拔度羣倫或儒或釋為聖為賢為佛菩薩皆於斯道是二是一以至王侯將相宰臣修此妙道福祿爾昌治國寧民聖明天子修此妙道運祚悠長如天無疆嘆哉斯道推運劫會敦固坤輿遷流時序升沉二象運行陰陽體統太極保固天根視之不見聽之不聞因應變化神乎其神修道之士克會玄微鍊精氣神立其命原固其本真徐悟本來得入真諦然後積纍三千八百深宏功行以證金仙復由太淸淸靜無為受法靈寶闡揚玉淸元始真一至道積種種功行種種行願盡纍劫立無量無等之功德於是殊勛懋績完足乃始親受玉皇誥命為大羅天無上無為至真玄宰號為天尊與天地俱微乎妙哉爾諸弟子諦聽斯旨各各明了至玄至道微妙因緣如法修持生大智慧無二無疑乃有十方至真上宰默為保護一切魔王咸為俯首在世長年或膺寵祿位極人臣或住名山逍遙快樂天仙廣化故奉天敕為演此經云偈曰至哉妙道法無等亦無倫一切有情屬咸䝉是經利廣化真君讚寶法虛玄得未曾元皇演化闢蒼冥靈寶九天開赤氣萬法歸宗復一元道德天微傳象教混淪濁界露天心上清蓬噩希觀相鬱勃婆羅轉法輪玄氣坱升廓碧落露篆凝虛現始靑玉符頒御吞浩劫化化無端遍玉京蘭林香噴陵谷易鳥篆虬章定玉衡祖根蟠結天根固三十六宮盡含春真師泄漏玄玄妙一字因緣證上乘此經是三淸祕旨是三洞真文無敢贅讚一詞甲寅十月舟過維揚得之爰於八品經五品經詳加校正合訂一帙以便讀誦名曰十六品經意取大丹之數亦符心傳之意也弟子惠覺薰沐再志柳祖師三品經後記嘗謂天經地緯絢為璀璨之文章海藏河沙衍夫玄妙之義藴久矣玉局宏開兩間盡絪緼之氣聿哉貝書廣譯三乘極梯筏之言古今來聖賢心印仙佛傳燈載諸金石播諸竹帛雖遍五千四十八數而增益之烏足計經典之指歸也哉則是仙經玄範之昭垂於宇宙間者朗朗然炳如日星煌煌然光被上下又烏可以燭照而數計也尚何品之云乎尚何三品之云乎我孚佑帝師誓無量度人之願現身說法普濟羣迷一片婆心隨時方便憫兹下土凡愚汨沒日甚斫喪日深更兼左道狂瀾肆行妄誕愈見浸熾而於三教本原不特渺焉莫究且復彼此交譏互相攻擊正道之榛蕪聖言之閼塞非我孚佑帝師振臂一呼大施覺路幾幾乎墜地斯文糜爛人心矣爰於壬午之歲鶴駕臨凡降夫夏汭集衆弟子結涵三宮闡演靈章恢宏正化厯十餘載至壬辰歲始告竣天工付厥鐫印其經典之透闢三教宗旨理致淵深分者合之二者一之晦者明之疑者晰之統發乾坤之祕大彰今古之微誠希有之真文實至玄之寶籙津梁末學啓迪後人大功德力豈守元之所能殫述哉又豈守元之所敢仰讚也哉第憶數十年來凡經營典務守元幸忝列侍從得以稍伸贊襄奔走後先時親優渥含哺法乳餐聽妙音見聞斯道之萬一於聖側固屬涵三諸弟子因緣際遇然皆我孚佑帝師惓惓不已不厭不倦之訓勉而成斯懋績也於是大典鐫印之後我師即證無上玉淸之果而諸子亦被利賴無窮之休獨惜近念餘年沿習漸微廣布未幾甚有於斯典計慮者乃得金陵孫子守恕夙慕玄宗久飴道味獲親餘澤仰覩鴻文欣然拜悅矢力重梓以廣流通復慮經軸莊嚴奉持者未免凛科律之戒不能朝夕玩索以期體行似於聖心博施之功有所閉礙遂請易為簡帙裝訂成函而其矢誠繕録者則上元恪誠解子也工竣乞志始末於經後守元思至人窮神而達化固無等倫則其敷演至言博採而旁搜應無涯涘特是道之精湛雖已泄於探幽鈎隱之際然而文之昭布必有賴乎燮綱調紀之人玄教藩籬得斯誠信之子可作東南半壁矣我孚佑帝師無量度人之願不幾有所慰藉乎哉將見是函之遍惠海隅使衆生咸聞道要獲覩真宗則三品之一而二二而三三而窮之什百千萬俾人人心目中皆有此三品一典其功德力真不可燭照而數計也孫子流衍之功與解子臨摹之力其福蔭又不與斯典常存歟守元幸叨見聞之榮敢肆筆道其始末以志册尾將以為天下後世聞知者勉修厥德云爾是為記時旃䝉單閼孟陬上浣方山道士宏教真人弟子柳守元稽首拜撰十六品經後跋此經彚十六品為一卷金丹法也全經之義貫徹天人非專論金丹而以金丹之數輯成者蓋以吾孚佑上帝為金丹鼻祖而所謂天仙法無一非金丹法耳夫金丹之妙大之有關於道德之源精之有合於性命之微釋曰圓覺儒曰太極實皆不外乎是所可太息者南宗北宗之傳不絶如線矣人何由深造自得優入聖域乎今幸孚佑上帝覺世慈心度人洪願叠示此經以貽後學前八品詳示詮諦而會其極中五品顯指淵微而攬其要後三品更合三淸之玄祕以闡一元之樞機學者果能常目在之心悟之身體之力行之則大羅天可由斯直達矣豫叨膺守壇任又值重訂全書之時爰敬志數語卷末俾人知是經所在常有天神護持讀者愼勿作常典觀焉可也覺源守壇大惠真人吳鳳洲敬跋十六品經後跋十六品經者乃孚佑上帝覺世之真詮傳道之妙典也會三教精微為萬法宗主非尋常鼎爐鉛汞龍虎嬰姹之說而究亦闡其祕而賅其全理仍不外乎性命道正妙統乎仙佛上合三淸之密旨而體無極下綜萬古之丹經而集大成舉凡九轉之精功三才之法象天仙之心傳煉丹之要訣莫備於斯莫捷於斯莫詳明貫徹於斯矣蓋自此經出而人人可登大羅無上之境不啻有雲梯之可升高焉不啻有慈航之可渡海焉噫正如日麗中天十方朗照頓破塵世之夢因大開升仙之覺路耳敻乎至矣瓜以加矣小子蒲自甲寅以來陸續得觀各品編輯訂校已幾七載迄庚申歲始有定本視宗正舊刋較詳今同學公校全書宗正而重訂之首將是刻收入集中噫是經也擷千七百餘處之精華厯數十百年乃獲振興於道運昌明之會而吾人亦且生生滅滅於其間而不自知今幸值覺源洪濟一旦克成千秋盛舉此天時耶抑人事耶要皆吾孚佑上帝之仁心有以默運於大千世界之中而固早於始作之日預示乎此日之流通廣布若操劵然若符契然讀是經者當思教育之深恩而溯淵源之有自庶不負度世慈心云爾惠覺弟子蔣豫蒲守中氏謹跋
