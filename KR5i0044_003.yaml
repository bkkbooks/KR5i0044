body:
  text: 十六品經八品經五品經三品經孚佑上帝純陽呂祖天師著八品經太極證真闔闢品第一圖爾時玉皇至尊在兜率凌霄天宮同瑶池聖母演說開天皇極普濟妙法五老帝君偕十洲三島五嶽四瀆三界真仙咸集左右聽說妙法時有東嶽帝君出班奏曰昔有天符下降為因衆生悖逆君親欺凌父母染貪塵欲婪酷利名奸盜邪淫穢污濁亂人我互執骨肉忿爭特敕報折子孫釁災地土遵即抄録部洲夭喪麻痘流行百千萬億旱潦稼穡十損七八罪重者殲嗣罪輕者疾瘟寃魂盈司莫能濟拔饑饉載道日不聊生如斯罪報衆生仍不修省無由濟拔伏望慈尊哀憐愚昧救大苦惱布頒恩命轉祻成祥令皆皈依正道離諸障礙人無橫夭國泰年豐庶滯魂賴以超升則疾疫除而淸泰俾天淸地寧物阜氣平玉帝聞曰善哉善哉塵寰汚濁惡貫乾坤天地日守㫻轉輪障業因迷正道故作過愆已敕警化孚佑三教宗師呂帝君下界大闡玄化啓悟盲聾諭講微妙圓通無極太極大道滌蕩世界塵氛咸使改邪歸正是時吾奉至尊無為妙旨拯救生靈俾人看誦者能釋幽寃宿苦善解在世愆尤悉化君正臣直父慈子孝兄弟和睦互愛六親禮義不失家道淸寧衆等肅誠諦聽吾教太極無形先天地生氣神合併混一鴻濛一氣既動動而履陽其卦應乾動極復靜靜而生陰其卦應坤輕淸上浮乾道曰天重濁下凝坤道曰地夫天者天運不息氣旋如環夫地者地定以靜風徑而載天地互附體用以全天依於地地依於天日者陽氣積而精外明也月者陰氣積而魄含景也陰陽之理悉係於易璇璣之要經緯存焉此天地化工之變也六十卦象一倒一正一降一升升而合陽降而符陰修丹之士演卦屯䝉屯卦升陽䝉卦符陰大有上下反正須明陰陽之奧晦朔之分亥子初交丹結之靈任督二脉陰陽之精通暢百脉流轉一身自然而然非神之能水火二氣上下之分足底湧泉二氣之根升入尾閭符合而君一水一火右命左精上升夾脊雙關貫通達此泥丸而返明堂默灌五宮下重樓中直往絳庭復流丹府晝夜不息難以壅停真火無候大藥無斤以神馭氣至道乃成人稟三才體全太極心先天地廓徹圓通本性虛湛用運和冲神化自然綿綿忘情觀天之道執天之行精化為氣氣化為神煉神還虛號之長生衆生不悟迷亂七情喜怒哀樂神喪於形悖忤綱常違逆彝倫因溺欲浪種種不仁子不孝親臣不忠君兄不愛弟弟不敬兄婦不順夫友不信朋仁義乖張形神不寧虛浮詐僞剛狠自矜貢高我慢護已挫人以致上帝震怒罪釁災迍稼穡不收骨肉飄零橫亡夭死水火瘟刑尚不知省怨憾神明愚頑愆重敕吾降臨闡教開宗說法度生各宜修省誠一於心忠孝慈義積德纍功痛返前非改過自新靜而悟道默而養神吾傳至理宏示天人若能參覺頓超苦輪吾憐衆溺屢化身形遍巡宇宙普度羣生此經首品略演修因後注七品為大梁津信受皈依名列天庭覺之者靈謗之者轟悟之者證果於仙籍傳之者利益於三生皇極聖道勿視以輕助之者增福延夀滅之者永墮幽冥天神鑒察報應昭明齊戒禮誦萬神咸欽城隍里社遵教奉行在壇衆生歡喜信受作禮而退玄元孝道五行品第二圖金太極火土水木初三月爾時純陽呂帝君曰吾因往昔心存於道隨形托化未嘗迷根昧性固不失本源亦難逢至訣身世浮沉纍受纍修積功積德誓行孝悌忠義仁慈後遇東華洞主正陽帝君遂聞大道飛升金闕證聖成真憐諸苦惱遊行三界普濟羣生近有天旨敕度業海盲聾但貪名逐利者多證聖修真者少藐視人輕惟懷已勝性如狼虎噬毒尤加心口置於兩途機謀狥於萬種染欲者萬億惜命者幾何太上曰我有三寶保而持之一曰慈二曰儉三曰不敢為天下先以慈能勇以儉能廣故不敢為天下先而能以成其器所謂真者虛心絶慮保氣養精應物而不存於物養虛而體於虛空情意了然厥修元始六關嚴守一息恆存氣神不竭神氣相溶伏其氣於臍下守其神於身中神氣孚合關捩開通爾口說道道居何處心不忘道道已得處體聖賢心行聖賢事方為道矣吾承恩命接引衆生慧照汝等尚不信受妄行智巧播弄奸頑掩詐雜真真難領悟可見浮生無有仁德吾體天地之心為心但願羣迷普修慈善冥心注神神與氣符服膺元氣勿喪三般今為衆生開演易理喻以前聖而譬曉玄微見易包於道道包於易採而行之潛而修之默而守之勤而煉之則神升紫府位列仙班乾坤混合易象如斯一氣既判兩儀之源窮神知化周匝環綿知微知彰隱顯難言絡繹不絶光範太玄自矜不長惟曲可全守道以訥任兌必愆致中抱一履和而謙以卑而積以柔而堅心動為意意轉情牽情牽著妄妄引多愆夫人之情也見物如虎之逐人之意也見物如龍之纒動心不滅照心難圓命在於腎性屬於乾心凝為神神靜為性窮理盡性混茫無端神歸無為煉煆三元視而不見聽而不喧言而無聲萬慮俱捐五行之道水火化焉火水相洽水火互兼火中有土水中有焰火既生土三性以全以土制水水溢必旋導水濟火水火交歡金木合併氣神相連金情木性驅煉膠粘中宵漏永光透重簾溫和頤養升汞降鉛金浮木墜赤日當天火要水濟水賴火炎以柔制剛剛柔連綿煉成一塊非汞非鉛能升能降號曰胎仙運火煉藥神與氣以火喻神以氣喻藥以神合氣氣足神全河車之數運氣周天心息相依腹存目蠲戊土從坎進之陽火已土從離退之陰符進合與退含之太玄元海之竅循之泥丸五氣混合萬象朝天時人不識附會亂傳人道未了仙道難全欲修真道人道合仙參而行之仙聖同肩受形父母體合情緣移神脫氣朔會嬋娟二氣相資龜蛇盤旋混聚凝結胞胎是全溫養十月體符先天劈開混沌顯象燦然懷育乳哺母形羸煎子漸養成體固神完脫氣化育罔極昊天所云脫化妙理幽玄胎元之道符合坤乾陽施陰受情性交連今世迷徒散內溺外七情惜憐六根頓壞失本忘真不知警戒火燥水崩氣離神汰顧子恤妻掌中珠愛父母洪恩眼中塵礙不孝悖逆罪愆廣大汝既惜子當惜父母汝若孝親子亦孝汝汝不敬親子亦違忤父母衰顏電光草露感氣受形當思乳哺吾今垂經首孝為務五行之先百行之路順其志顏天神擁護活祖不參歲月空度不孝之輩身劈雷部報應昭明速當醒悟暗室可欺於心神明難以掩飾欲學仙道長生先修人道為急易曰憧憧往來朋從爾思氣和乃神之衢也精化乃藥之務也還精補腦如濛如霧以無生有世罕修也天形何以長門樞何不蠧內照慧寶光燦燦明珠府衆生所以不能悉心領悟者由乎情著於物恩迷於愛也若致柔以怡回骸反視則道斯存矣廣成子曰無視無聽抱神以靜詩曰上天之載無聲無臭西方學曰無智無得無所得故如電如露應作是觀太上曰反者道之動弱者道之用大音希聲大象無形俗人昭昭我獨若昏夫天地所以長久者以其不自生也大哉聖之言乎仲尼有曰毋必毋固孟氏有曰勿忘勿助皆存神馭氣之階也今人不自知耳養氣之道要在綿綿譬如流水之曲暢恍若飛雲之凌空乍似圓珠之滚盤既如嬰兒之無我中庸曰暗然日章壁經曰其心休休夫豈皆泛語哉今古聖賢若車同軌世俗無知妄分三教不識千燈處一室共明萬法循一理共聖不參至理玄微妄執是非人我尋枝摘葉鼓舌誇唇逞臂著迷盲修瞎煉後之學者盡被牽引而不悟也但願衆生精進於道矢心於誠莫泥於象莫著於文尊師親友虛已以敬默然悟之長生可躋矣即說偈曰北一天地精普化於萬靈乾坤能轉軸龍虎潛真踪六魔以消蕩三元景燦明烏兔結中谷龜蛇蟠內庭遊行超宇宙掌握回死生驅掣雷電光鬼怪悉潛形敢有違逆者劈體如纖塵慧光所照處災厄悉和平敬受而誦讀名奏於天宮帝君說經已畢時有祥雲香靄瑞氣盤旋鶴馭碧空師回駕已衆等投地稽首俯伏作禮信受而退真一忠悌養育品第三圖金水相平造物以生孚佑道人題及時採取獲我丹功爾時純陽呂帝告金陵大衆曰吾因鶴城徐氏久在空門實踐樂施致身顚沛年逾七十道心不退雖無冲舉亦有深功因承玉音命度蒼生慧照乾坤感誠降彼已說微妙真經中太極闔闢玄元孝道一品二品化育之機但彼處衆生貢高我慢姤嫉貪嗔屢以善道化之羣生執著不了即有二三闡法皆不體吾普濟之念各懷私意作逞高能善言慈誨不勸於人以教外虛浮矜誇於已未得仙地不信至言可嘆可喟行吾道者積功修德勸善化惡講教忠孝勵勉信誠養氣致柔從容中道明無人非幽無鬼責和平衆性循順民情以道義行仁慈利物濟生愍貧恤苦慈悲惻隱澤及昆蟲至於草木亦不傷殘憫人凶恤人苦放生戒殺具大慈悲行方便心勝如齊戒體天地德即是修持行吾道者如遇不善之人以德以理化之苟弗依善而幻拗者亦當和氣怡顏以接所以宣聖循循然善誘人婁師德唾面自乾何曾嗔怒若克已泰而不驕彼必化惡歸善乃闡教之功設使不教民戰是為棄之焉無罪哉如遇敬道之人以恩以善結之苟錯行道而偏著者必當引解聖經以悟易曰同聲相應同氣相求孔子曰以友輔仁皆因德惠若盡已和而不同彼必皈正起敬乃闡教之功設使顚而不扶心何忍乎豈不愆歟天下之人有教無類為師作傅當以忠恕敬肅順氣怡顏義以為質禮以行之遜以接之信以成之深則厲厲則難從淺則揭揭則生亂言不重則不威至哉守一心平氣和氣和神暢神暢體舒浩然天地俯仰無愧翕然性情不離體用存真一心超真一道吾聞太上曰先天而生生而無形後天而存存而無體靜為之性心在其中動為之心性在其中心生性滅心滅性現如空無相湛然常滿夫大道無象內存於有真性無外不生其心居境忘境無象以存守乎無體固蒂深根養於天真若忘若存精以合氣氣以合神太上曰神以形生精以氣盈知其神氣可以長生引先聖語以合三教非妄枝葉以誤羣生若能頓悟可保真形吾因傳經維揚誑傲故示教於金陵以忠悌品普化羣生不願持齊惟願信心齊之謂齊以齊於心心不修持齊胡為功只知戒口罔知戒心即心是道堅守勿輕爾等侍壇各有宿因得聞斯道以靜塵心塵欲克盡大道昭明仍取毗陵五品玄文合品傳揚易換品經敬而持之吾當降靈語維揚衆各改嗔心毋蹈前非枉廢修因若壞種子必加罪懲信心敬受必獲超升道沒窮富勸勿擇人言有必無知真未真修道之人心無毫塵得道之士行多隱貧道非財受受傳信人以利求吾吾何以聞虛已覓道聖必顯靈勿作人師將人視輕阻人參修報殃滅門善言當喻誣話休論被褐懷玉焉可量人昔我太上曰見小曰明守柔曰剛用其剛而復其明無遺身殃夫無為故無敗無執故無失臯陶稱舜御衆以寬仲虺贊湯克寬克仁若矜而無乖戾羣而無阿比躬自厚而薄責人斯近道矣故聖人修身以道修道以仁嘉善以矜不能至道斯凝柔於遠人天下歸仁以贊天地化育而參三才今學玄者外丹搬弄四黃內丹止於功坐不思五金非八石之母幻身非先天之道所以燕不生鳳狐不乳馬以幻身作養以砒石鹵卜行持非真父母氣不相接神不相投安能鍊外而養內也夫六魔滅而六通存三尸斬而三光現不離乎身非著乎身今悟參者以為坐得夜坐日臥何以鍊形十二時中行而勿失以神馭氣以氣運精精不役形不於情生情不動移精不溺崩精非有生因情而生以精合氣和翕天真天真非真真以强名懷人我念豈為道心行道之士體天地心曰儒曰釋曰道三教非離於心儒以謙和釋以忍辱玄以致柔精氣神非柔莫得戒定慧非忍莫守仁義德非和莫御柔忍和厥中乃成中者性也性本乎善進乎陽火以情伏性退乎陰符以性歸情所為性者木也汞也神也火也龍也蛇也所云情者金也鉛也精也水也虎也龜也皆譬語也以神運精則精化氣以金尅木則木成材驅龍就虎龍虎交歡以心伏身心身翕泰以情歸性情性和溶以鉛歸汞汞鉛膠漆以龜絡蛇蛇龜盤旋非口口傳皆强猜也儒所以行釋所以寂玄所以存寂者寂於生老病苦死指寂幻也行者行仁義禮智信指行政也存者存金木水火土指存神也生老病苦死以寂之仁義禮智信以行之金木水火土以存之物生於土而喪於土人生於氣而喪於氣能靜土能養氣玄可參矣即說偈曰大哉玄真水火相勻以情歸性非著貪嗔虛無妙道配合天心此天心者非血肉心厥一以真勿二以傾由誠而入由默而成相非有靈靈於寸誠吾以誠格非以財臨守道諸子先修汝心勿肆高傲勿著頑空戒暴戒怒積德積仁勸孝於親勸忠於君勸信於友勸恤於貧勸慈於物勸和於鄰莫誇已勝莫滅他人富亦無根何須自矜貧豈常貧何須怨嗔貧不求諂富不驕凌善善惡惡報應昭明汝若修善子孫旺興汝若作惡後代凋零恤孤憐老戒殺放生日積月纍必獲修功三元保舉萬聖助成他年行滿拔宅超升師宣偈畢會中諸天仙侶同聲稱贊稽首法壇謝禮天尊悉心信受願體帝君寶經誓行平等除三毒遠六塵淨心明性俯首師前時駕駐真境仙樂浮空白鶴飛翔丹霞映室大衆作禮於是煉石弟子守中伏跪於地以是篇乃三才之位因敬贊曰統觀八品摶空成塊如天之覆如地之載日月璧合光輝常在上下古今貫徹無礙金碧參同印合匹配五次傳經八卦相對真覺以還次第明誨真覺胎還靜定品第四圖滿而不溢顚而防危象體乾天樞合四時爾時呂帝復告衆生曰世幻羣盲不體於無盡滅於有往往求道著妄迷真不知道自身來非身搬運華嚴經云心如工畫師等淸靜緣起首楞嚴以狂性歇歇即菩提聞復翳根除塵銷覺圓淨涅槃曰因愛生憂因憂生怖夫爾等怖心皆從愛生離此愛海名為真覺金剛經曰一切為有如夢幻泡如電如露應作是觀汝等久誤頑空多相多迷如斯道義可能覺否可能行識故佛名經曰有愛則生愛盡則滅體此生滅可以共語非吾博求衆聖多諭皆因三教人妄分歧枝葉橫出懸隔霄壤根本究參同歸一理心絶塵勞是為虛靖又以釋教是寂滅道殊不自知楞嚴經曰寂滅者寂一心非息動滅非生已之滅識巳生處方知滅處圓覺經曰慧目肅淸者乃淸內境內境不生真實性定性定情靜便明先天先天曰神凝神入坤而生藥靈後天曰氣運氣入乾而還丹功所謂真性寂然不動感而遂通以神煉藥馭氣養神氣注於神非卦象形火種相續丹鼎常溫故似天地循環不停悟圓靜覺以靜覺心不取幻化及諸淨相了知身心皆為𦊱礙無知覺明不依諸礙西方之學離幻是道所以天地不言而成先天真性來虛無中後天真定從忍辱明兀而默存凝精化神蔽物喪志散氣分靈不為物纍以神保精精依神化性靜神融太上有曰常以無欲以觀其妙常以有欲以觀其竅採其欲竅以合玄妙故佛世尊曰以寂滅力而起至靜住於淸靜吾今說法天神簇擁雷火監壇金童爇香玉女散瓊萬聖咸集滌蕩塵氛更有妙經吾說全文伏聞無上玉皇胎息妙經曰胎從伏氣中結氣從有胎中息氣入身來為之生神去離形為之死知神氣可以長生固守虛無以養神氣神行即氣行神住即氣住若欲長生神氣相注心不動念無來無去不出不入自然常住勤而行之是真道路胎息銘曰三十六咽一咽為先吐惟細細納惟綿綿坐臥亦爾行立坦然戒於喧雜忌於腥羶假名胎息實曰內丹非只治氣决定延年久久行之名列上仙蓋玉皇乃金丹之祖此經最宜細心體會又有無上玉皇心印妙經吾蓋向曾心注今亦全示爾等無上至尊之極稱玉光輝潔白之狀皇萬天之主心德之本體印符信之驗妙恰好之辭經通常之路上藥三品凡病雖多根惟三種對症用藥只有一劑神與氣精神天地之真機氣陰陽之真脉精性命之真髓恍恍無見之見惚惚無聞之聞杳杳小之又小無小可小冥冥微之又微無微可微存無伸出拿空手守有不昧本來人頃刻而成不落階級回風混合水乳交融百日功靈打成一片默朝上帝靜裡會合一紀飛升形神俱妙與道合真知者易悟動容揚古道不墮悄然機昧者難行百年鑽故紙無有出頭時履踐天光頭頭皆顯露物物體元平呼吸育淸如火消氷如氷消火出玄入牝內無所出外無所入若亡若存亡無可亡存無可存綿綿不絶萬古常新固蒂深根萬緣頓息人各有精道不遠人精合其神抱元真自得神合其氣守一性自調氣合體真不缺分毫真常獨露不得其真見聞中求皆是强名認賊作子神能入石何堅不破神能飛形四大本空入水不溺一口吸盡西江水入火不焚紅爐火內鍊黃金神依形生火賴薪傳甚勿錯過精依氣盈花借地開乘時自種不凋不殘益無可益損又何損松柏靑靑本分道人原無二色三品一理渾然太極妙不可聽全體畢露何待舉揚其聚則有保在當人其散則零失迷萬劫七竅相通本無隔礙竅竅光明觸著便是聖日聖月萬里長空收暮雲照耀金庭淸光遍九洲一得永得得個甚麼自然身輕腳下分明太和充溢性遍虛空骨散寒瓊裁氷為雪得丹則靈煆丸成聖不得則傾本聖落凡丹在身中如王秉劍非白非靑著相魔生誦持萬遍法輪常轉妙理自明粉碎虛空衆等諦聽諦聽依此鍊修皇君詔見吾今闡法徑指真詮拒絶塵心道心坦然廣行陰德回悟三元功德不修虛湛難聞塵心未了仙境難升此身不修更待何年道凝德潤可期天仙泰然靜定自超人寰迷津夢覺乃見根源任心不了吾難訓言大丹之理養氣調元但安神息即是胎還所謂真人潛乎深淵情性合一妙理自然虛明內照慧日當天信而行