氏云心精洞圓含裹十方體如虛空無有邊際當下便是動念則乖無奈衆生不識本心認賊為子以奴役主以妄纍真是以輪回生死無有休息深為哀愍仙師說經已畢時有五雲覆室瑞色縈堂於是莫來佛子出班讚曰闡經度劫好生為心笛音落處消塵氛仁慈孚佑尊仙佛咸欽拔濟善因深莫來佛子暨真仙神王皆大歡喜作禮信受而退開基採藥品第二演正帝君曰自有身來迷性失命七魄拔舍三尸敗戶六賊乖搏四大幻渺長者以短夀者以夭淸者以濁智者以愚失乎聖父聖母之氣純乎凡父凡母之氣知飲知食無異披毛戴角惟聖人以道全形以術延命挹無涯之元氣續有限之形軀脫凡父凡母之氣純乎聖父聖母之氣故煉性煉形不難成佛成祖須知此身未生之先一呼一吸氣通乎母既生之後一呼一吸氣通乎天人能靜坐返心內照於無為無妄中自有如電如露一點真陽勃勃然引八玄關透乎長谷竟乎泥丸化為玉液琤琤然降於五內驅一切關竅之邪蕩一切臟腑之穢且必以神馭氣以氣定息呼吸出八隨其運轉任他太極虛空打成一片丹基如春氣之生核神龍之養珠紫陽真人曰金鼎湯常暖玉爐灰怯寒以其打成陽址在乎用意暖之藏神守之故曰火冷由意散火起由意炎能知陽抽陰不怕藥不堅能知藥救火豈至燥金丹若夫採藥在乎有為必知無為方得有為南華經云至道之精窈𥥆冥冥道德經云𥥆兮冥兮其中有精夫精甚正真精乃真種真種乃洞洞真種雖洞洞採藥施其功夫真種者何也或名陽精或名玄珠或名黃芽或名真鉛或名玄牝種種稱號莫可名窮凡有形動皆屬濁塵安可比同雲房老祖曰一身皆屬陰何處是陽精陽精能知象象象乃通明吾嘗曰𥥆𥥆冥冥生恍惚恍恍惚惚結成團若修真者不知真種非落空漢即枯坐漢未得歸根旁門泛泛本其師傳無有正帆皆知子時窄不知子時寬能知活子時何怕藥無丹夫萬神已暢定有惡龍戰幾場血定玄黃將判猶未判男女正同房恍恍惚惚莫使奔放所謂靜而動抽出真陽添我真汞戊土能敦真鉛降趁我藥苗嫩急採入高巷玉虛真人曰真鉛與汞配藥裹煆金剛重陽真人曰文武火候默默貫老嫩浮沉細細商仙師說經已畢時甘露下降諸仙稽首於是玉蟾真人出班端拱讚曰四生父母仁慈帝君闡演丹訣泄天文吐霧篆祥雲喝散氤氲霞客普欣聞玉蟾真仙及諸洞仙子皆大歡欣命諸弟子䖍誠持受而退煆鼎煉爐品第三演正帝君曰夫爐為偃月懸胎名焉玄牝聚焉嬰兒結焉顆珠成焉黃芽茂焉匪金匪鐵匪玉匪石匪硃匪砂黃庭為鼎煆爐氣家百脉交充三元會洽乾作鼎而坤作爐端養仙花且鼎無氷魄則陰液不生不生則火龍靈根不長爐無玉蕊則陽氣不孚不孚則水虎命蒂盡屠故爐有陽升降以之鼎有陰闔闢成之一升一降一闔一闢靑龍白虎金烏玉兔天魂地魄相抱留戀煉成至寶無二無一方許天真若夫火候必在工夫未得丹時須藉武火以鎔之巽風以吹之審其火之無不然也既得丹時須藉文火以養之神水以沃之若過則損之不及則益之決其火之無不然也紫陽真人曰一十月工夫存杳杳綿綿之息三萬年氣數在來來往往之間海蟾真人曰卦行火候周天畢孕箇嬰兒鎮海田時莫月鼎真人出班端拱請曰大道無言至象無形有言必彰有形必明無使黑風一到墮孽淵塵龍者何也虎者何也烏者何也兔者何也魂者何也魄者何也祈師昭白以闡靈文師真曰離日為汞己土為汞以龍居水變化莫窮生生殺殺莫測其功雲行雨施風疾雷轟佛有毒龍玄有燭龍穴有火龍降其火龍以積寒汞降之者降其心中真火火性不飛則汞積汞積則龍濳龍濳則火純火純則陰滅陰滅則真鉛與真汞合真龍與真虎洽故曰不積汞無以取其鉛不降龍無以伏其虎戊土無名强名曰虎虎者鉛也坎也燥也烈也損人肉骨傷人性命也易曰風從虎又曰履虎尾不嘻人人能馴以豢之懼以循之則先天足而虎伏虎伏則鉛棲鉛棲則汞虛汞虛則虎神虎神則龍現龍現則虎騰虎騰則龍飛故無心真人曰對境無心一氣歸根萬神朝祖混混沉沉捧捧存存兀兀騰騰綿綿相續方是修行悟真云先把乾坤為鼎器次搏烏兔藥來烹火龍真師曰坎內黃男名汞祖離中玄女是鉛家坎一陽居中為烏離一陰居腹為兔譬以男女異室決不生育鉛汞異爐決不成丹紫虛真君曰吾有黃婆守正媒之導其意也意引坎內黃男配離中玄女夫妻一媾即變純乾謂之取坎填離還我先天本體魂魄者陰陽之謂也聖人以魂運魄故能長生衆人以魄攝魂故多促殞魂晝寓目魄夜舍肝寓目能見舍肝能夢聖人有覺無夢衆人有夢無覺與其夢中說夢不如覺裡尋覺蓋因魄有精因精有魂因魂有意因意生魄魄也魂也龍也虎也烏也兔也二也一也長生真人曰夜深龍吟虎嘯時速駕河車無暫歇紫淸真人云奔歸氣海名朱驥飛入泥丸是白鴉吾亦有曰天魂生白虎地魄産靑龍運寶泥丸住搬精入上宮仙師說經己畢時鳳舞鸞翔瑞雲漫空諸仙歡喜於是莫月鼎真人出班稽首作禮讚曰偃月爐中熾焰騰又非柴炭又非薪吹噓不用外調息煆煉還須內養神姹女騎龍旋鼎外金翁跨虎奔壺心海田馭鶴搜寒玉西土留烏鎔兌金法按屯䝉添抽度功旋壇墠有無形丹還九轉明珠燦光遍千山琪樹春蓬島點石驚羽客塵寰闡教度羣生願今世世聆玄奧願化人人體聖心願起沉疴蘇白骨喝開鐵鎖鬼魂升讚願說畢同諸仙作禮而退空形虛命品第四演正帝君曰修真之道在乎煉形煉形有五金液煉形玉液煉形太陰煉形太陽煉形惟一以貫真空煉形內觀其心心無其心外觀其形形無其形無形形空無心心空天地空太古空虛空空地獄空人鬼空任有無常無處追踪以此長年夀算無窮宏忍大師曰會運身者如運甕然身處甕外則甕身活身處甕中則身甕死以其能空則滅者生不空則生者滅四祖曰一切煩惱業障本來空寂六祖曰凡夫即佛煩惱即菩提前念迷即凡夫後念悟即佛前念著境即煩惱後念離境即菩提百丈佛祖曰心源湛寂法海淵深迷之者永劫沉淪悟之者當時解脫放曠喻如虛空淸淨同於皓月始從克念之功必證無為之地所以大覺世尊修寂滅而證真常斷塵勞而成正覺三世諸佛不分在家出家只要辦心成道厯代祖師以無染為宗故得天魔拱手外道皈依上酬四重之恩下濟羣生之苦又曰論道之源如水在氷氷外求水非是總要自性淸靜自可證果又曰諸弟子所起念處日日都未解脫邀福是便未見根株且自以為善便非真善善隱德也所謂天下莫能知莫能見其盜機也聖人盜天地之道三教皆然所謂宇宙在乎手萬化生乎身故其機若盜焉修道者採日精月華採即此機也故欲立功修當先知月窟天心之位又曰覺源便是此中玄坤濁乾淸體自然莫向他方尋位置坎離乃竟占先天又曰覺正覺明是為上乘覺者守中道也人能時時以戒為梯為航無上能至闊海能渡大寂佛祖曰一性永性必至無上地位又曰三定性得覺果又曰如嶽如海心念永持軒轅老祖曰明心之德昏蔽日開無亢無卑和平是福又曰丹無無心無心之心將許有成太上諭修丹訣曰道體法用貴乎雙修孤行無耦種而不收體用兼得何舍何求晃朗太虛與吾何有虛皇上真曰道雖內外合一尤須始終貫通敬以勝怠謹可有功吾嘗曰養氣忘言守降心為不為動靜知宗祖無事更求誰真常須應物應物要不迷不迷性自住性住氣自回氣回丹自結壺中配坎離陰陽生反覆普化一聲雷白雲朝頂上甘露灑須彌自飲長生酒逍遙誰得知坐聽無絃曲明通造化機都來二十句端的上天梯又有百字曰本性好淸靜保養心猿定酒又何曾飲色欲已罷盡財又我不貪氣又我不競見者如不見聽者如不聽莫論他人非只尋自己病官中不係名私下憑信行遇有不輕狂如無守本分不在人殼中免卻心頭悶和光且同塵但把俗情混因甚不爭名曾共高人論故學子當時時正覺其心魔之蔽道最忌反意生心使自不知耳有顯有應皆魔道無見無聞是大乘無說無相真妙理有作有為是旁門毋許著相著念著心覺之不覺在自念降之不降三心不可得最妙之術也真正辦道者先斷礙生信信當正信正信者無為法也無為即中道也能信無為則生定定後則慧慧則無往不知不覺能真知正覺有何不成上果也故心心相印則傳心法正己是也吾友高真人曰人能了卻浮緣頓破無明可直超三界光勝日月有異無遮動靜鬼神莫測惜世人明正不習知偏不禁可為慟也皆為浮緣不捨解脫無期甘墮苦海願落輪回枉受鬼神之威振相隨吉凶而化轉皆認無常為常錯看浮合為實之故耳爾諸弟子信受研窮粉碎形骸鎔冶虛空當知大道即是真空念起為幻色念滅即真空真空是何面目冰消水靜相同仙師說經已畢時瑞氣騰空異香滿室諸仙端拱信受而退於是玉淸真人出班讚曰死性性生機守命濳虛息究竟無一物寂靜空萬慮能虛黃芽長能空真種慧龍虎相濟合男女成婚配欲擒寒玉魄趁此陰陽濟孕箇混沌團烹之恍惚意綿綿無塞間默默常如是劈開太極圖超出四大內現體金剛燦洞洞齊天地仙佛真祕奧誰識箇中趣萬物不能縛五行無所制成仙豈二訣入聖同一氣師今垂訓詮廣度諸愚昧稽首法座前願人長受持脫胎出陽品第五演正帝君曰火候既足真胎欲産嬰兒在胎涵養既久延滿十月脫出其胞由太玄而升天谷是謂真人即所謂主人翁也佛曰淨識玄曰嬰兒即所謂真種子也蓋嬰兒當遷胎易鼎之時透太玄關劈開乾戶神光湧湧霹𩆝轟轟翻身躍出乃冥棲氣穴之間又開一混沌矣夫此穴乃神仙脫胎定息之關嬰兒安身立命之所原係熟境順路而歸赤子既安處靜域寂坐道場須密加護持愼於將養始則藉坤母黃芽以育之繼則斂天地生氣以哺之此感彼應發邇見遠其中赤子一呼一吸一升一降一往一來一動一靜罔不自若必須觀心除妄直到水窮山盡絶無半點客塵煩惱則寂湛真常自在旡礙玄竅嬰兒得大安穩蓋溫養嬰兒乃修仙首務勿為外緣所侵內妄所亂行住坐卧不可暫忘語默動靜不可稍忽若驪龍養珠慈母育子朝夕防衛寤寐顧復更須嚴守關元不可輕縱出去恐一出而迷途遂失舍而忘歸待厯年老成九載功完自有靈通變化之妙陽神出現了卻真空成金剛不壞之體天地同夀之翁既登仙闕混入凡塵施我法乳推我赤誠汲引後學普度衆生三千行滿八百功成丹書宣詔白鶴來迎羽軒載我金光逼人異香縹眇天樂雜鳴湘靈鼓瑟玉女吹笙左有絳節右有霓旌飛升金闕同歸始靑仙師說經已畢諸仙稽首皆大歡喜於是桂英仙真出班端拱讚曰闡經度劫恩遍十方諸神仙子列成行同聲共讚揚鶴舞鸞翔紫氣靄蒼茫五品成功諸弟子恭謝上帝䖍叩真仙神王均願信受奉行作禮而退此經引合禪玄祕語點汞成丹矣弟子惠覺謹志三品經梓潼帝君讚道法玄玄妙淸微道德尊萬言妙諦示良因紫氣貫鴻鈞和氣氤氲妙理泄黃庭高虛淸明天主留開經偈人身有三寶為神與精氣生天生地人無極而太極後天本先天一元分妙緒五德配五行五常權五位三才合撰者三教總歸一斷障除根賊情泯昭玄契天地道法玄玄玄涵精義玉淸上淸境太淸玄關祕透泄示天人修行有階級至哉妙道言宇宙濳消沴化彼諸衆生溥為增利益至道極玄大乘度劫三品真經上卷爾時玄元廣法天尊在玉淸聖境淸微宮中與諸大天尊無極神王飛天大聖同詣元始座下推閲劫會檢録玄圖天尊憫念下方衆生惡孽過多劫運深重慨爾太息爰乃出班俯囟作禮上白元始天尊前曰下方衆