front:
  text: 十六品經孚佑帝君寶誥
  hash: sha256:97cf5cb4e0dad34d6909d996774ee0292dc72f8f5aaa97a93a2ec4853a1641b1
  markers:
  - {type: page-break, offset: 4, content: '', id: CK-KZ_KR5i0044_02p001a}
body:
  text: 至心皈命禮唐朝得道宋室開元拜正陽而上輔玉皇賜寶劍而下降妖怪遍現十方行大化默遊三界救羣生總督九關傳玉旨護持三教闡金綸九皇贊仰煉雲砂中天職理參辰曜龍沙會上號玄師紫府宮中居法位宏誓未完此心未泯方方垂訓處處顯神大聖大慈大仁大孝敕封三十三天大法宮中金蓮臺上代天宣化統領衆生扶理正陽總督關教華蓋掌道大士警化孚佑上帝純陽呂祖天師親身救劫誓願度人真廣慈尊至心皈命禮蕭宇玄臣香林仙宰道冠八洞金函職奉三淸玉敕氷壺煉氣結祥靄於大乙之扉星劍騰輝印寶光於上樞之殿綸巾貫巽德之風羽袖本乾元之體採雲芝化金龍於玄鼎成霧柳變玉虎於瓊鐺神貫日烏氣吐丹虹萬里精凝月兔光開珠露千霄醉鶴垂綸法振五雷號令飛鸞執拂身為三教綱維慧力開玄威風攝崇大聖大慈大仁大孝玉淸協化紫洞持宗天曹逸史瑤池較籙西竺明玄北極梵宰三界行人六府選仙靈通肇化玄都孚佑帝君純陽演正興行持劫妙道濟世天尊至心皈命禮玉淸內相金闕選仙化身為三教之師掌法判五雷之令黃粱夢覺忘世上之功名寶劍光騰掃人間之妖怪四生六道有感必孚三界十方無求不應黃鵠溪頭留聖蹟玉淸殿內煉丹砂存芝像於山崖顯仙踪於古洞衍法門之香火作玄嗣之梯航大聖大慈大仁大孝開山啓教元應祖師天雷上相靈寶真人純陽演正警化孚佑帝君興行妙道天尊至心皈命禮玉淸神霄上府冲玄靈寶雷霆太行上師五雷主判仙卿一氣自然虛無通玄度人無量當太乙之權衡掌九天之樞紐大慈大悲大真大教三台無上真人五洞明師高上老純陽演正警化孚佑帝君兼三十六雷神管諸嶽之神煞羣仙都領袖衆聖之真仙無上一氣天尊至心皈命禮巍巍無上宮渺渺淸微境至道極無為玄通昭靈應綜儒釋道之全而統歸一貫合天地人之撰而妙藴三才厯恆河沙劫廣濟羣迷遍大千世界溥施法乳玉律金科字字泄乾坤之祕奧龍章鳳篆言言示仙佛之筌蹄闡發太極先天津梁垂於奕異宣揚皇風帝澤位詣卓乎天真大悲大願大聖大仁玉淸真宰道極無為至玄至聖萬氣持衡孚佑現化三教宗師玄元廣法天尊圓通文尼真佛至心皈命禮虛微玄奧靜化幽冥演無上之玄元消萬劫之罪果降魔度世立道超迷功高上洞之雷司德庇人天之世界大慈大化大願大尊隱顯萬方逍遙億國興天地之體共日月之照掌三十六極之仙銜管七百八界之神册立洪洪大志度億億凡生最高最上廣化廣仁玄玄應化功高普度億感大成萬正紫極真人垂慈接教伏邪警世帝君興行妙道天尊至心皈命禮中天無上宮三教慈悲主繼道統於列聖垂規範於萬真演八品五品之奧旨示仙子佛子之慈航大哉正位蓬萊玄功廣博偉矣尊居峻極覆照崇隆號令十方作金闕之上宰統攝五嶽為仙佛之宗師懲咎褒良消灾弭沴大悲大願大聖大慈開壇啓教玄應祖師帝師無上慈光援引純陽演正警化孚佑妙通帝君興行妙道天尊至心皈命禮正陽一派妙行降生尊居金闕之中位列震宮之上佛號光圓自在道稱玄應祖師忠誥孝誥立綱常垂示道儒寶筏性宗命宗闡玄化指明仙佛金丹十年苦行證果六陽九轉功成遊行三界作塵世之醫王為上天之糾察現妙相而攝服四夷幻真形而引援三教發下三十願願願度人遍厯百千壇壇壇降筆收緣救劫鋤惡褒良普度羣生超離諸苦大慈大悲大仁大孝帝師無上宮主純陽演正警化孚佑妙通宏仁普惠帝君玄元廣法天尊至心皈命禮無極一聖應化度人化身為三教之師紫府掌糾司之令性宗道德體湛寂而真常命蕆音闡東華煉九還而七返恆河寶筏道岸津梁丹成庚月先天法藏拈華正眼了無四相不别三門功德洪深人天示現領玉淸靈寶之簡命奉彌羅金闕之靈符普度有緣咸登正覺四生六道無不垂恩三界十方有求則應劫超元會果證圓通大悲大願無聲無臭祖師天醫上將玉淸內相金闕選仙靈寶真人演正警化孚佑帝君興行妙道三五神德一氣真君廣濟正道神人九梵符籙真人興隆大道天尊光圓自在通佛
