body:
  text: 十六品經十六品經序文殊師利法王子白言人心道心本是一乘乘無上下分於人心上心自悟迷乃下心賴以證徹是曰寶經唯吾道祖普濟羣生大覺世界誓願洪深奉敕宣化妙義斯呈廣為說法度有緣人前前後後古古今今隨地說法隨緣現身久久圓滿十六品經遇緣斯說得今以成此有彼合來往紛紜更兼人我相相相爭義因以晦不傳於今萬緣堅固乃有法成總無為法本此一心千慮萬念利益衆生唯恃此寶乃得生生生生有道其道在誠功自已立行自已行此經昭著胥被衆生拯之水火拔之沉淪奉此朝夕千秋維新克新厥德仍然接引吾道炯炯世緣冥冥一顯宗旨大義日星可為寶鑑衆志咸平虛靈不昧本體乃明後有作者萬劫同春善哉善哉速如郵行十六品經題詞豫隨侍呂帝千百年來見法聞法深知我帝君度世慈心無窮無盡無量無邊兹十六品經乃天仙之心傳覺世之心鐙也夫帝君之經多矣吐詞為經無非妙典奚必以十六品靳之顧時各不同地各不同人各不同隨宜說法每皆一期方便非必如此經之直示金丹祕妙緣久而始會合成帙也牟尼法寶字字奇光洵非人間世所易易覩往嵗南中亦曾分刻流布而未彚其全即莫當厥旨且不無疏略遺訛之處門下士惠覺總而輯之蓋取大丹一斤之義是真有合於慈悲說法之心今復同及門大固志秋大器法嗣恩洪等共為重訂全書宗正以是經冠諸首豫奉命總理督辦謹詳志其顚末如是至此經之妙義雖以滄海濡墨須彌為筆終劫贊之亦不能盡豫故弗敢多著言詮唯願天下後世之讀是典者一一印之於心廣布而流通之是大千普度一慈航也宏教弟子柳守元熏沭題詞
